{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>词趣家庭 - 家庭背单词</title>
    <link rel="icon" href="{% static 'words/images/favicon.ico' %}" type="image/x-icon">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #8b5cf6;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .login-container {
            background: white;
            border-radius: 24px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.3);
            overflow: hidden;
            width: 100%;
            max-width: 900px;
            display: flex;
        }
        .login-banner {
            flex: 1;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            padding: 3rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            color: white;
        }
        .logo { font-size: 2.5rem; margin-bottom: 0.5rem; }
        .brand { font-size: 2rem; font-weight: 800; margin-bottom: 0.5rem; }
        .tagline { opacity: 0.9; margin-bottom: 2rem; }
        .features { margin-top: 1rem; }
        .feature {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }
        .feature-icon { font-size: 1.5rem; }
        .feature-text { font-size: 0.95rem; }
        
        .login-forms {
            flex: 1;
            padding: 2.5rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .welcome { text-align: center; margin-bottom: 2rem; }
        .welcome h2 { font-size: 1.5rem; color: #1e293b; margin-bottom: 0.5rem; }
        .welcome p { color: #64748b; }
        
        .role-buttons { display: flex; flex-direction: column; gap: 1rem; }
        .role-btn {
            display: flex;
            align-items: center;
            padding: 1.5rem;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            text-decoration: none;
            color: #1e293b;
            transition: all 0.2s;
        }
        .role-btn:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.15);
        }
        .role-icon { font-size: 2.5rem; margin-right: 1rem; }
        .role-info h3 { font-size: 1.1rem; margin-bottom: 0.25rem; }
        .role-info p { font-size: 0.85rem; color: #64748b; }
        .role-arrow { margin-left: auto; color: var(--primary); font-size: 1.5rem; }
        
        .alert {
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }
        .alert-success { background: #d1fae5; color: #065f46; }
        .alert-error { background: #fed7d7; color: #c53030; }
        
        .footer {
            text-align: center;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid #e2e8f0;
        }
        .footer p { color: #64748b; font-size: 0.85rem; }
        .footer a { color: var(--primary); text-decoration: none; }
        
        @media (max-width: 768px) {
            .login-container { flex-direction: column; }
            .login-banner { display: none; }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-banner">
            <div class="logo">📚</div>
            <div class="brand">词趣家庭</div>
            <div class="tagline">让背单词成为亲子时光</div>
            <div class="features">
                <div class="feature">
                    <span class="feature-icon">📄</span>
                    <span class="feature-text">PDF智能提取单词</span>
                </div>
                <div class="feature">
                    <span class="feature-icon">🎮</span>
                    <span class="feature-text">贪吃蛇、闯关游戏</span>
                </div>
                <div class="feature">
                    <span class="feature-icon">🧠</span>
                    <span class="feature-text">科学复习算法</span>
                </div>
                <div class="feature">
                    <span class="feature-icon">👨‍👩‍👧</span>
                    <span class="feature-text">家长孩子共同管理</span>
                </div>
            </div>
        </div>
        
        <div class="login-forms">
            <div class="welcome">
                <h2>欢迎使用词趣家庭</h2>
                <p>选择您的身份开始学习之旅</p>
            </div>
            
            {% if messages %}
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">{{ message }}</div>
            {% endfor %}
            {% endif %}
            
            <div class="role-buttons">
                <a href="{% url 'parent_login' %}" class="role-btn">
                    <span class="role-icon">👨‍👩‍👧</span>
                    <div class="role-info">
                        <h3>我是家长</h3>
                        <p>管理家庭、导入单词、查看孩子进度</p>
                    </div>
                    <span class="role-arrow">→</span>
                </a>
                
                <a href="{% url 'child_login' %}" class="role-btn">
                    <span class="role-icon">👶</span>
                    <div class="role-info">
                        <h3>我是孩子</h3>
                        <p>学习单词、玩游戏、完成任务</p>
                    </div>
                    <span class="role-arrow">→</span>
                </a>
            </div>
            
            <div class="footer">
                <p>还没有账号？<a href="{% url 'parent_register' %}">家长注册</a> · <a href="{% url 'child_register' %}">孩子注册</a></p>
            </div>
        </div>
    </div>
</body>
</html>
