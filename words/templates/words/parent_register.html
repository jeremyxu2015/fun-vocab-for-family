{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家长注册 - 词趣家庭</title>
    <link rel="icon" href="{% static 'words/images/favicon.ico' %}" type="image/x-icon">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #8b5cf6;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .register-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 2.5rem;
            width: 100%;
            max-width: 450px;
        }
        .header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .header h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        .header p { color: #64748b; }
        
        .form-group { margin-bottom: 1.25rem; }
        .form-label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        .form-input {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1rem;
        }
        .form-input:focus {
            outline: none;
            border-color: var(--secondary);
        }
        .btn {
            width: 100%;
            padding: 1rem;
            background: var(--secondary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        .btn:hover { background: #7c3aed; }
        
        .alert {
            padding: 0.875rem;
            border-radius: 8px;
            margin-bottom: 1rem;
        }
        .alert-error { background: #fed7d7; color: #c53030; }
        .alert-success { background: #d1fae5; color: #065f46; }
        
        .links {
            text-align: center;
            margin-top: 1.5rem;
        }
        .links a { color: var(--secondary); text-decoration: none; }
    </style>
</head>
<body>
    <div class="register-card">
        <div class="header">
            <h1>👨‍👩‍👧 家长注册</h1>
            <p>创建家庭，管理孩子的学习</p>
        </div>
        
        {% if messages %}
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }}">{{ message }}</div>
        {% endfor %}
        {% endif %}
        
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label">用户名</label>
                <input type="text" name="username" class="form-input" required placeholder="用于登录">
            </div>
            <div class="form-group">
                <label class="form-label">密码</label>
                <input type="password" name="password" class="form-input" required placeholder="至少6位">
            </div>
            <div class="form-group">
                <label class="form-label">昵称</label>
                <input type="text" name="nickname" class="form-input" placeholder="如：爸爸、妈妈">
            </div>
            <div class="form-group">
                <label class="form-label">家庭名称</label>
                <input type="text" name="family_name" class="form-input" placeholder="如：温馨小家" value="我的家庭">
            </div>
            <button type="submit" class="btn">注册并创建家庭</button>
        </form>
        
        <div class="links">
            <a href="{% url 'login' %}">已有账号？返回登录</a>
        </div>
    </div>
</body>
</html>
