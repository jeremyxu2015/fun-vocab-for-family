{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>批量导入 - 词趣家庭</title>
    <link rel="icon" href="{% static 'words/images/favicon.ico' %}" type="image/x-icon">
    <style>
        :root { --primary: #6366f1; --primary-dark: #4f46e5; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            min-height: 100vh;
            padding: 1rem;
        }
        .container { max-width: 700px; margin: 0 auto; }
        .header { display: flex; align-items: center; margin-bottom: 2rem; }
        .header a { color: var(--primary); text-decoration: none; margin-right: 1rem; }
        
        .card {
            background: white;
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            margin-bottom: 1.5rem;
        }
        
        .tabs { display: flex; margin-bottom: 1.5rem; border-bottom: 2px solid #e2e8f0; }
        .tab {
            padding: 0.75rem 1.5rem;
            cursor: pointer;
            color: #64748b;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
        }
        .tab.active { color: var(--primary); border-bottom-color: var(--primary); }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .form-group { margin-bottom: 1.25rem; }
        .form-label { display: block; font-weight: 600; margin-bottom: 0.5rem; }
        .form-input, textarea {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
        }
        textarea { min-height: 200px; font-family: monospace; }
        .form-input:focus, textarea:focus { outline: none; border-color: var(--primary); }
        
        .btn {
            padding: 1rem 2rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        .btn:hover { background: var(--primary-dark); }
        
        .hint {
            background: #f1f5f9;
            padding: 1rem;
            border-radius: 8px;
            font-size: 0.9rem;
            color: #64748b;
        }
        .hint code { background: #e2e8f0; padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="{% url 'word_management' %}">← 返回</a>
            <h1>批量导入单词</h1>
        </div>
        
        <div class="card">
            <div class="tabs">
                <div class="tab active" data-tab="text">文本粘贴</div>
                <div class="tab" data-tab="file">文件上传</div>
            </div>
            
            <form method="post">
                {% csrf_token %}
                <input type="hidden" name="mode" value="text">
                
                <div class="tab-content active" id="text-tab">
                    <div class="form-group">
                        <label class="form-label">粘贴单词内容</label>
                        <textarea name="bulk_text" placeholder="apple | n. 苹果 | /ˈæpl/
book | n. 书 | /bʊk/
cat | n. 猫"></textarea>
                    </div>
                    <div class="hint">
                        <strong>格式说明：</strong>每行一个单词，用 <code>|</code> 或 Tab 分隔<br>
                        格式：<code>单词 | 释义 | 音标(可选) | 难度(可选)</code>
                    </div>
                </div>
                
                <div class="tab-content" id="file-tab">
                    <div class="form-group">
                        <label class="form-label">上传文件</label>
                        <input type="file" name="file" class="form-input" accept=".csv,.xls,.xlsx">
                    </div>
                    <div class="hint">
                        支持 CSV 和 Excel 文件，第一列为单词，第二列为释义
                    </div>
                </div>
                
                <button type="submit" class="btn" style="margin-top: 1.5rem;">开始导入</button>
            </form>
        </div>
        
        <div class="card">
            <h3 style="margin-bottom: 1rem;">💡 推荐使用PDF导入</h3>
            <p style="color: #64748b; margin-bottom: 1rem;">
                如果你有PDF格式的词汇表或课本，可以使用PDF智能导入功能，自动识别单词和释义。
            </p>
            <a href="{% url 'pdf_import' %}" class="btn" style="display: inline-block; text-decoration: none;">去PDF导入</a>
        </div>
    </div>
    
    <script>
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                tab.classList.add('active');
                
                const mode = tab.dataset.tab;
                document.querySelector('input[name="mode"]').value = mode;
                document.getElementById(mode + '-tab').classList.add('active');
            });
        });
    </script>
</body>
</html>
