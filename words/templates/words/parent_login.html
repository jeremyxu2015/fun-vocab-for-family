{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>词趣家庭 - 家长登录</title>
    <link rel="icon" href="{% static 'words/images/favicon.ico' %}" type="image/x-icon">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #8b5cf6;
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            width: 100%;
            max-width: 900px;
            display: flex;
        }
        .login-banner {
            flex: 1;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            padding: 3rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            color: white;
        }
        .login-banner h1 { font-size: 2rem; margin-bottom: 1rem; }
        .login-banner p { opacity: 0.9; line-height: 1.6; }
        .features { margin-top: 2rem; }
        .feature { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem; }
        .feature-icon { font-size: 1.5rem; }
        
        .login-forms {
            flex: 1;
            padding: 2.5rem;
        }
        .tabs {
            display: flex;
            margin-bottom: 2rem;
            border-bottom: 2px solid #f1f5f9;
        }
        .tab {
            flex: 1;
            padding: 1rem;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            color: #64748b;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
        }
        .tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .form-group { margin-bottom: 1.25rem; }
        .form-label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #1e293b;
        }
        .form-input {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.2s;
        }
        .form-input:focus {
            outline: none;
            border-color: var(--primary);
        }
        .btn {
            width: 100%;
            padding: 1rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover { background: var(--primary-dark); }
        .btn-parent { background: var(--secondary); }
        .btn-parent:hover { background: #7c3aed; }
        
        .alert {
            padding: 0.875rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }
        .alert-error { background: #fed7d7; color: #c53030; }
        .alert-success { background: #d1fae5; color: #065f46; }
        
        .links {
            text-align: center;
            margin-top: 1.5rem;
        }
        .links a {
            color: var(--primary);
            text-decoration: none;
        }
        
        @media (max-width: 768px) {
            .login-container { flex-direction: column; }
            .login-banner { display: none; }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-banner">
            <h1>📚 词趣家庭</h1>
            <p>让背单词成为亲子时光！支持PDF智能导入，游戏化学习，科学复习算法。</p>
            <div class="features">
                <div class="feature">
                    <span class="feature-icon">📄</span>
                    <span>PDF智能提取单词</span>
                </div>
                <div class="feature">
                    <span class="feature-icon">🎮</span>
                    <span>贪吃蛇、闯关游戏</span>
                </div>
                <div class="feature">
                    <span class="feature-icon">🧠</span>
                    <span>SM-2科学复习算法</span>
                </div>
                <div class="feature">
                    <span class="feature-icon">👨‍👩‍👧</span>
                    <span>家长孩子共同管理</span>
                </div>
            </div>
        </div>
        
        <div class="login-forms">
            <div class="tabs">
                <div class="tab active" data-tab="parent">家长登录</div>
                <div class="tab" data-tab="child">孩子登录</div>
            </div>
            
            {% if messages %}
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">{{ message }}</div>
            {% endfor %}
            {% endif %}
            
            <!-- 家长登录 -->
            <div class="tab-content active" id="parent-tab">
                <form method="post" action="{% url 'parent_login' %}">
                    {% csrf_token %}
                    <div class="form-group">
                        <label class="form-label">用户名</label>
                        <input type="text" name="username" class="form-input" required placeholder="请输入用户名">
                    </div>
                    <div class="form-group">
                        <label class="form-label">密码</label>
                        <input type="password" name="password" class="form-input" required placeholder="请输入密码">
                    </div>
                    <button type="submit" class="btn btn-parent">家长登录</button>
                </form>
                <div class="links">
                    <a href="{% url 'parent_register' %}">还没有账号？立即注册</a>
                </div>
            </div>
            
            <!-- 孩子登录 -->
            <div class="tab-content" id="child-tab">
                <form method="post" action="{% url 'child_login' %}">
                    {% csrf_token %}
                    <div class="form-group">
                        <label class="form-label">用户名</label>
                        <input type="text" name="username" class="form-input" required placeholder="请输入用户名">
                    </div>
                    <div class="form-group">
                        <label class="form-label">密码</label>
                        <input type="password" name="password" class="form-input" required placeholder="请输入密码">
                    </div>
                    <button type="submit" class="btn">孩子登录</button>
                </form>
                <div class="links">
                    <a href="{% url 'child_register' %}">还没有账号？立即注册</a>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(tab.dataset.tab + '-tab').classList.add('active');
            });
        });
    </script>
</body>
</html>
