<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <link rel="icon" href="/static/words/images/favicon.ico?v=2" type="image/x-icon">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生注册 - VocabMaster</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; }
        .login-box { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); width: 90%; max-width: 400px; text-align: center; }
        h1 { color: #2d3748; margin-bottom: 10px; font-size: 24px; }
        .subtitle { color: #718096; margin-bottom: 30px; font-size: 14px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 8px; color: #4a5568; font-weight: 600; font-size: 14px; }
        input, select { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        input:focus, select:focus { border-color: #667eea; outline: none; }
        .code-hint { font-size: 12px; color: #718096; margin-top: 6px; }
        button { width: 100%; padding: 14px; background: linear-gradient(135deg, #48bb78, #38a169); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 10px; transition: opacity 0.2s; }
        button:hover { opacity: 0.9; }
        .alert { background: #fed7d7; color: #c53030; padding: 10px; border-radius: 6px; margin-bottom: 20px; font-size: 14px; }
        .hint { margin-top: 20px; padding: 15px; background: #f0f4ff; border-radius: 8px; font-size: 13px; color: #667eea; text-align: left; line-height: 1.6; }
        .links { margin-top: 24px; font-size: 14px; }
        .links a { color: #667eea; text-decoration: none; font-weight: 500; }
        .links a:hover { text-decoration: underline; }
    
        /* 移动端适配 */
        @media (max-width: 480px) {
            body { padding: 1rem; }
            .message, .login-box, .form-box, .game-container, .ranking-box {
                padding: 1.5rem !important;
                margin: 0 !important;
                width: 100% !important;
                max-width: 100% !important;
                border-radius: 12px !important;
                box-shadow: 0 8px 24px rgba(0,0,0,0.2) !important;
            }
            h1 { font-size: 1.3rem !important; }
            p { font-size: 0.9rem !important; }
            input, select, button { font-size: 14px !important; }
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>📝 学生注册</h1>
        <p class="subtitle">首次使用？填写信息创建账号</p>

        {% if messages %}
        {% for message in messages %}
        <div class="alert">{{ message }}</div>
        {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>班级</label>
                <select name="class_name" required>
                    <option value="">请选择班级</option>
                    <option value="五1班">五年级1班</option>
                    <option value="五2班">五年级2班</option>
                    <option value="五3班">五年级3班</option>
                    <option value="五4班">五年级4班</option>
                </select>
            </div>
            <div class="form-group">
                <label>注册验证码</label>
                <input type="text" name="registration_code" required placeholder="请输入老师给的6位数字" maxlength="6" pattern="\d{6}">
                <div class="code-hint">🔒 请联系班主任获取注册验证码</div>
            </div>
            <div class="form-group">
                <label>学号</label>
                <input type="text" name="student_id" required placeholder="例如：01">
            </div>
            <div class="form-group">
                <label>姓名</label>
                <input type="text" name="real_name" required placeholder="你的真实姓名">
            </div>
            <button type="submit">注 册</button>
        </form>

        <div class="hint">
            <strong>💡 注册须知：</strong><br>
            • 需要老师发的6位验证码才能注册<br>
            • 初始密码为你的学号，登录后请及时修改<br>
            • 每个学号只能注册一次
        </div>

        <div class="links">
            <a href="{% url 'student_login' %}">← 已有账号？返回登录</a>
        </div>
    </div>
</body>
</html>
