<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <link rel="icon" href="/static/words/images/favicon.ico?v=2" type="image/x-icon">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生登录 - VocabMaster</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; }
        .login-box { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); width: 90%; max-width: 400px; text-align: center; }
        h1 { color: #2d3748; margin-bottom: 10px; font-size: 24px; }
        .subtitle { color: #718096; margin-bottom: 30px; font-size: 14px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 8px; color: #4a5568; font-weight: 600; font-size: 14px; }
        input, select { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        input:focus, select:focus { border-color: #667eea; outline: none; }
        button { width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 10px; transition: opacity 0.2s; }
        button:hover { opacity: 0.9; }
        .alert { background: #fed7d7; color: #c53030; padding: 10px; border-radius: 6px; margin-bottom: 20px; font-size: 14px; }
        .alert-success { background: #c6f6d5; color: #276749; }
        .links { margin-top: 24px; font-size: 14px; display: flex; flex-direction: column; gap: 10px; }
        .links a { color: #667eea; text-decoration: none; font-weight: 500; }
        .links a:hover { text-decoration: underline; }
        .divider { margin: 20px 0; border-top: 1px solid #e2e8f0; position: relative; }
        .divider span { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: white; padding: 0 12px; color: #a0aec0; font-size: 13px; }
    
        /* 移动端适配 */
        @media (max-width: 480px) {
            body { padding: 1rem; }
            .message, .login-box, .form-box, .game-container, .ranking-box {
                padding: 1.5rem !important;
                margin: 0 !important;
                width: 100% !important;
                max-width: 100% !important;
                border-radius: 12px !important;
                box-shadow: 0 8px 24px rgba(0,0,0,0.2) !important;
            }
            h1 { font-size: 1.3rem !important; }
            p { font-size: 0.9rem !important; }
            input, select, button { font-size: 14px !important; }
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>📚 英语单词打卡</h1>
        <p class="subtitle">输入班级和学号登录</p>

        {% if messages %}
        {% for message in messages %}
        <div class="alert {% if message.tags == 'success' %}alert-success{% endif %}">{{ message }}</div>
        {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>班级</label>
                <select name="class_name" required>
                    <option value="">请选择班级</option>
                    <option value="五1班">五年级1班</option>
                    <option value="五2班">五年级2班</option>
                    <option value="五3班">五年级3班</option>
                    <option value="五4班">五年级4班</option>
                </select>
            </div>
            <div class="form-group">
                <label>学号</label>
                <input type="text" name="student_id" required placeholder="例如：01">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" name="password" required placeholder="初始密码为学号">
            </div>
            <button type="submit">登 录</button>
        </form>

        <div class="divider"><span>或</span></div>

        <div class="links">
            <a href="{% url 'student_register' %}">📝 还没有账号？点击注册</a>
            <a href="{% url 'teacher_login' %}">👨‍🏫 教师入口</a>
        </div>
    </div>
</body>
</html>
